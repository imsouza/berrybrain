name: Release Images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic version tag to build and publish
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build:
    name: ${{ matrix.service.name }} ${{ matrix.arch.name }} image
    runs-on: ${{ matrix.arch.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: worker
            dockerfile: apps/worker/Dockerfile
          - name: web
            dockerfile: apps/web/Dockerfile
        arch:
          - name: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - name: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - id: release
        name: Resolve immutable release coordinates
        shell: bash
        env:
          SERVICE: ${{ matrix.service.name }}
          ARCH: ${{ matrix.arch.name }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi
          echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "image=$REGISTRY/${GITHUB_REPOSITORY_OWNER,,}/berrybrain-$SERVICE" >> "$GITHUB_OUTPUT"
          echo "arch=$ARCH" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push native architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: ${{ matrix.arch.platform }}
          push: true
          tags: |
            ${{ steps.release.outputs.image }}:${{ steps.release.outputs.version }}-${{ steps.release.outputs.arch }}
            ${{ steps.release.outputs.image }}:sha-${{ steps.release.outputs.sha }}-${{ steps.release.outputs.arch }}
          labels: |
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.revision=${{ steps.release.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
          provenance: mode=max
          sbom: true

  manifest:
    name: ${{ matrix.service }} multi-architecture manifest
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, worker, web]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - id: release
        name: Resolve immutable release coordinates
        shell: bash
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "image=$REGISTRY/${GITHUB_REPOSITORY_OWNER,,}/berrybrain-$SERVICE" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: manifest
        name: Publish immutable multi-architecture manifest
        shell: bash
        env:
          IMAGE: ${{ steps.release.outputs.image }}
          VERSION: ${{ steps.release.outputs.version }}
          SHA: ${{ steps.release.outputs.sha }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "$IMAGE:$VERSION" \
            --tag "$IMAGE:sha-$SHA" \
            "$IMAGE:$VERSION-amd64" \
            "$IMAGE:$VERSION-arm64"
          docker buildx imagetools inspect "$IMAGE:$VERSION" > manifest-inspect.txt
          digest="$(awk '$1 == "Digest:" {print $2; exit}' manifest-inspect.txt)"
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Could not resolve manifest digest for $IMAGE:$VERSION" >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign manifest digest with GitHub OIDC
        env:
          IMAGE: ${{ steps.release.outputs.image }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: cosign sign --yes "$IMAGE@$DIGEST"

      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.release.outputs.image }}@${{ steps.manifest.outputs.digest }}
          format: spdx-json
          output-file: berrybrain-${{ matrix.service }}.spdx.json
          artifact-name: berrybrain-${{ matrix.service }}-${{ env.RELEASE_TAG }}.spdx.json
          upload-artifact-retention: 90

      - name: Attest SBOM with GitHub OIDC
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
          IMAGE: ${{ steps.release.outputs.image }}
        run: >-
          cosign attest --yes
          --predicate "berrybrain-${{ matrix.service }}.spdx.json"
          --type spdxjson
          "$IMAGE@$DIGEST"

  release:
    name: Publish GitHub release
    needs: manifest
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Create release from verified tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
        run: >-
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1
          || gh release create "$TAG" --repo "$GITHUB_REPOSITORY"
          --verify-tag --generate-notes --title "BerryBrain $TAG"
