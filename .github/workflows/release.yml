name: Release Images

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  images:
    name: ${{ matrix.service }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
          - service: worker
            dockerfile: apps/worker/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/berrybrain-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=long

      - id: build
        name: Build and push immutable image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign image digests with GitHub OIDC
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] && cosign sign --yes "${tag}@${DIGEST}"
          done <<< "$TAGS"

      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/berrybrain-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: berrybrain-${{ matrix.service }}.spdx.json
          artifact-name: berrybrain-${{ matrix.service }}-${{ github.ref_name }}.spdx.json
          upload-artifact-retention: 90

      - name: Attest SBOM with GitHub OIDC
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/berrybrain-${{ matrix.service }}
        run: >-
          cosign attest --yes
          --predicate "berrybrain-${{ matrix.service }}.spdx.json"
          --type spdxjson
          "${IMAGE}@${DIGEST}"
