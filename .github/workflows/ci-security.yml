name: CI Security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest
    env:
      BERRYBRAIN_ENV: test
      BERRYBRAIN_DATABASE_URL: sqlite:////tmp/berrybrain-ci-security.db
      BERRYBRAIN_VAULT_PATH: /tmp/berrybrain-ci-security-vault
      BERRYBRAIN_API_TOKEN: ci-token
      BERRYBRAIN_SESSION_SECRET: ci-session-secret-change-me-32-bytes
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: API security tests
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          PYTHONPATH=src python -m unittest -v tests.test_security_auth tests.test_maintenance
      - name: Python dependency audit
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit
          pip-audit --desc off --skip-editable
      - name: Web dependency audit
        working-directory: apps/web
        run: |
          npm ci
          npm audit --audit-level=high
