name: Python Lint

on:
  push:
    branches: [main]
    paths: ["apps/api/**", ".github/workflows/lint.yml"]
  pull_request:
    paths: ["apps/api/**", ".github/workflows/lint.yml"]

jobs:
  ruff:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff==0.6.9
      - name: Ruff check
        run: ruff check src
