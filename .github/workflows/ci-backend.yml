name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/ci-backend.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      BERRYBRAIN_ENV: test
      BERRYBRAIN_DATABASE_URL: sqlite:////tmp/berrybrain-ci-api.db
      BERRYBRAIN_VAULT_PATH: /tmp/berrybrain-ci-vault
      BERRYBRAIN_API_TOKEN: ci-token
      BERRYBRAIN_SESSION_SECRET: ci-session-secret-change-me-32-bytes
      BERRYBRAIN_REQUIRE_AUTH: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff==0.6.9
      - name: Ruff check
        run: ruff check src tests
      - name: API tests
        run: PYTHONPATH=src python -m unittest discover tests
