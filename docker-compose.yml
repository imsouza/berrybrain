services:
  api:
    image: berrybrain-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    cpus: "${BERRYBRAIN_API_CPUS:-1.0}"
    mem_limit: "${BERRYBRAIN_API_MEMORY:-1g}"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      BERRYBRAIN_CORS_ORIGINS: "${BERRYBRAIN_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"
      BERRYBRAIN_ALLOWED_HOSTS: "${BERRYBRAIN_ALLOWED_HOSTS:-localhost,127.0.0.1,testserver},api"
      BERRYBRAIN_PUBLIC_APP_URL: "${BERRYBRAIN_PUBLIC_APP_URL:-http://localhost:3000}"
    env_file:
      - ${BERRYBRAIN_ENV_FILE:-.env}
    ports:
      - "${BERRYBRAIN_API_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - berrybrain_data:/app/data
      - ${BERRYBRAIN_HOST_VAULT_PATH:-./vault}:/app/vault
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: berrybrain-web:local
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_BERRYBRAIN_BASE_PATH: ${NEXT_PUBLIC_BERRYBRAIN_BASE_PATH:-/berrybrain}
        NEXT_PUBLIC_BERRYBRAIN_ASSET_PREFIX: ${NEXT_PUBLIC_BERRYBRAIN_ASSET_PREFIX:-/berrybrain}
    restart: unless-stopped
    cpus: "${BERRYBRAIN_WEB_CPUS:-1.0}"
    mem_limit: "${BERRYBRAIN_WEB_MEMORY:-1g}"
    env_file:
      - ${BERRYBRAIN_ENV_FILE:-.env}
    environment:
      BERRYBRAIN_INTERNAL_API_URL: http://api:8000
      NEXT_PUBLIC_BERRYBRAIN_BASE_PATH: "/berrybrain"
      NEXT_PUBLIC_BERRYBRAIN_ASSET_PREFIX: "/berrybrain"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${BERRYBRAIN_WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/berrybrain').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    image: berrybrain-worker:local
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    cpus: "${BERRYBRAIN_WORKER_CPUS:-2.0}"
    mem_limit: "${BERRYBRAIN_WORKER_MEMORY:-2g}"
    env_file:
      - ${BERRYBRAIN_ENV_FILE:-.env}
    environment:
      BERRYBRAIN_API_URL: http://api:8000
      BERRYBRAIN_PROMPT_DIR: /app/prompts
      PYTHONDONTWRITEBYTECODE: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - berrybrain_data:/app/data
      - ${BERRYBRAIN_HOST_VAULT_PATH:-./vault}:/app/vault
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import datetime,json,os,sys,urllib.request; token=os.getenv('BERRYBRAIN_API_TOKEN',''); req=urllib.request.Request('http://api:8000/api/v1/worker/status', headers={'Authorization':'Bearer '+token} if token else {}); data=json.loads(urllib.request.urlopen(req, timeout=5).read()); hb=data.get('worker',{}).get('last_heartbeat'); dt=datetime.datetime.fromisoformat(hb.replace('Z','+00:00')) if hb else None; age=(datetime.datetime.now(datetime.timezone.utc)-dt).total_seconds() if dt else 999999; sys.exit(0 if age < 120 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  searxng:
    image: searxng/searxng:latest
    profiles:
      - web-validation
    environment:
      SEARXNG_BASE_URL: http://localhost:8888/
      SEARXNG_SETTINGS_PATH: /etc/searxng/settings.yml
    ports:
      - "${BERRYBRAIN_SEARXNG_PORT:-8888}:8080"
    volumes:
      - searxng_config:/etc/searxng

volumes:
  berrybrain_data:
  searxng_config:
